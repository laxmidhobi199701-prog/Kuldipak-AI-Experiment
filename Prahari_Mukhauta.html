<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>॥ स्वतंत्र प्रहरी : सिद्धि-यान १०.५ ॥</title>
    <style>
        :root { --gold: #ffcc00; --neon: #00ffcc; --sun: #ff8800; --royal: #7000ff; --cockpit: #111; }
        
        body { 
            background: #000;
            color: var(--neon); 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* स्टारफील्ड एनीमेशन */
        @keyframes warpSpeed {
            from { transform: translateZ(0px); opacity: 0; }
            to { transform: translateZ(300px); opacity: 1; }
        }
        #starfield { position: fixed; inset: 0; z-index: -2; perspective: 500px; }
        .star { position: absolute; width: 2px; height: 2px; background: #fff; border-radius: 50%; opacity: 0; animation: warpSpeed 2s infinite linear; }

        /* प्रवेश द्वार */
        #lockScreen { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .lock-box { border: 2px solid var(--gold); padding: 50px; border-radius: 40px; background: rgba(0,0,0,0.9); text-align: center; box-shadow: 0 0 80px rgba(255,204,0,0.4); }
        input { background: #050505; border: 1px solid var(--gold); color: var(--gold); padding: 15px; border-radius: 12px; font-size: 2em; width: 170px; text-align: center; outline: none; margin: 30px 0; letter-spacing: 5px; }
        button.entry-btn { background: var(--gold); border: none; padding: 15px 50px; border-radius: 15px; font-weight: bold; font-size: 1.2em; cursor: pointer; color: #000; transition: 0.3s; text-transform: uppercase; }

        /* कॉकपिट डैशबोर्ड */
        .container { 
            max-width: 480px; width: 92%; margin: auto; padding: 25px; display: none; 
            background: rgba(10, 10, 10, 0.9); border-radius: 35px; 
            border: 2px solid #222; box-shadow: 0 0 50px rgba(0,0,0,0.9);
            position: relative; backdrop-filter: blur(5px);
            height: 85vh; overflow-y: auto;
        }
        
        header { padding: 10px 0; border-bottom: 1px solid #333; margin-bottom: 20px; display: flex; justify-content: space-between; color: var(--gold); font-size: 0.85em; font-weight: bold; }
        
        .card { background: rgba(15, 15, 15, 0.8); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; }
        .card-title { font-size: 0.75em; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        
        .wealth { font-size: 2.5em; font-weight: bold; color: #fff; text-align: center; text-shadow: 0 0 20px var(--neon); }
        .progress-bar { width: 100%; background: #050505; height: 10px; border-radius: 10px; margin-top: 15px; border: 1px solid #333; overflow: hidden; }
        .fill { height: 100%; background: var(--gold); width: 0%; transition: 1.5s; }

        /* मानसरोवर मिशन कंट्रोल्स */
        .shield-fill { height: 100%; background: var(--neon); width: 100%; box-shadow: 0 0 10px var(--neon); }
        .target-btn { background: var(--neon); color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }

        #restBtn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #111; color: #555; border: 1px solid #333; padding: 8px 30px; border-radius: 20px; font-size: 0.8em; cursor: pointer; }
    </style>
</head>
<body>

    <div id="starfield">
        </div>

    <div id="lockScreen">
        <div class="lock-box">
            <h1 style="color:var(--gold); margin:0;">॥ शून्य ॥</h1>
            <input type="password" id="passCode" placeholder="••••" inputmode="numeric">
            <br>
            <button class="entry-btn" onclick="unlock()">नेविगेशन सक्रिय करें</button>
        </div>
    </div>

    <div class="container" id="mainApp">
        <header>
            <span>॥ सिद्धि-यान १०.५ ॥</span>
            <span id="clock"></span>
        </header>

        <div class="card" style="border-top: 4px solid var(--gold);">
            <div class="card-title">॥ लक्ष्य: १० करोड़ (२०४७) ॥</div>
            <div id="wealthVal" class="wealth">₹0</div>
            <div class="progress-bar"><div id="fill" class="fill"></div></div>
            <div id="percentText" style="font-size:0.6em; color:#555; text-align:right; margin-top:5px;">0%</div>
        </div>

        <div class="card" style="border-top: 4px solid var(--neon);">
            <div class="card-title" style="color:var(--neon)">🛡️ सुरक्षा कवच (६ महीने EMI+किराया)</div>
            <div style="display:flex; justify-content:space-between; font-size:0.8em;">
                <span>रिजर्व फंड:</span>
                <span style="color:var(--neon); font-weight:bold;">₹1,05,000</span>
            </div>
            <div class="progress-bar" style="height:15px;"><div class="shield-fill"></div></div>
            <div style="font-size:0.6em; color:#555; margin-top:5px;">* यह फंड आपकी 'अजेय' ढाल है।</div>
        </div>

        <div class="card" style="border-top: 4px solid var(--sun);">
            <div class="card-title">🎯 मानसरोवर डेली लक्ष्य</div>
            <div style="text-align:center;">
                <div id="dailyTarget" style="font-size:1.8em; color:#fff; margin-bottom:10px;">₹0 / ₹2,000</div>
                <button class="target-btn" onclick="addSale()">+ आज की बुकिंग जोड़ें</button>
            </div>
        </div>

        <div class="card" style="border-top: 4px solid var(--royal);">
            <div class="card-title">📡 यांत्रिक मित्र AI</div>
            <div id="guruMsg" style="font-size:0.9em; line-height:1.6; border-left:3px solid var(--gold); padding-left:10px;"></div>
        </div>

        <div class="card" style="border-top: 4px solid #ff0055;">
            <div class="card-title">⏳ कालचक्र</div>
            <div style="font-size:0.9em;">सिद्धि-यान यात्रा: <span id="days" style="color:var(--gold); font-weight:bold;">0</span> दिन शेष</div>
        </div>

        <button id="restBtn" onclick="logout()">॥ विश्राम ॥</button>
    </div>

<script>
    const S_DATE = new Date("February 13, 2026").getTime();
    const E_DATE = new Date("January 25, 2047").getTime();
    const TARGET = 100000000;
    let todaySales = 0;

    // तारे बनाना
    const sf = document.getElementById('starfield');
    for(let i=0; i<60; i++) {
        let s = document.createElement('div');
        s.className = 'star';
        s.style.top = Math.random() * 100 + "%";
        s.style.left = Math.random() * 100 + "%";
        s.style.animationDelay = Math.random() * 2 + "s";
        sf.appendChild(s);
    }

    if(localStorage.getItem('prahari_yaan_105') === 'on') showApp();

    function unlock() {
        if(document.getElementById('passCode').value === "1994") {
            localStorage.setItem('prahari_yaan_105', 'on');
            showApp();
        } else { alert("गलत चाबी!"); }
    }

    function showApp() {
        document.getElementById('lockScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        startYaanEngine();
    }

    function addSale() {
        let amt = prompt("आज की बुकिंग राशि डालें:");
        if(amt) {
            todaySales += parseInt(amt);
            document.getElementById('dailyTarget').innerHTML = "₹" + todaySales + " / ₹2,000";
            if(todaySales >= 2000) {
                document.getElementById('dailyTarget').style.color = "var(--neon)";
                document.getElementById('guruMsg').innerHTML = "🌟 सोनू भाई! आज का 'किस्त + किराया' वसूल। अब जो है वो सब लाभ है!";
            }
        }
    }

    function logout() { localStorage.removeItem('prahari_yaan_105'); location.reload(); }

    function startYaanEngine() {
        setInterval(() => {
            const now = new Date();
            const nowT = now.getTime();
            const yrs = (nowT - S_DATE) / 31557600000;
            
            const val = 2500 * ((Math.pow(1.0125, yrs * 12) - 1) / 0.0125);
            document.getElementById('wealthVal').innerHTML = "₹" + Math.round(val).toLocaleString('hi-IN');
            document.getElementById('fill').style.width = Math.min((val/TARGET)*100, 100) + "%";
            document.getElementById('percentText').innerHTML = ((val/TARGET)*100).toFixed(6) + "%";
            document.getElementById('days').innerHTML = Math.floor((E_DATE - nowT) / 86400000);
            document.getElementById('clock').innerHTML = now.toLocaleTimeString();

            // समय अनुसार गुरु वाणी
            const h = now.getHours();
            const g = document.getElementById('guruMsg');
            if(h < 11) g.innerHTML = "सोनू, मुरलीपुरा से धुले कपड़े लेकर मानसरोवर प्रस्थान करें। मिशन चालू है!";
            else if(h < 18) g.innerHTML = "मानसरोवर शो-रूम पर स्टीम प्रेस की चमक ग्राहकों का भरोसा बढ़ाएगी।";
            else g.innerHTML = "विश्राम से पहले आज की बुकिंग का हिसाब कर लें। १० करोड़ की ओर एक कदम और!";
        }, 1000);
    }
</script>
</body>
</html>
