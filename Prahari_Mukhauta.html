<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">

    <title>॥ स्वतंत्र प्रहरी ५.३ ॥</title>
    <style>
        :root { --neon: #00ffcc; --gold: #ffbb00; --bg: #000; --goal: #00ff00; --red: #ff4444; }
        body { background: var(--bg); color: var(--neon); font-family: 'Segoe UI', serif; margin: 0; text-align: center; }
        
        #lockScreen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .lock-logo { width: 120px; border-radius: 50%; border: 2px solid var(--gold); margin-bottom: 20px; box-shadow: 0 0 25px rgba(255,187,0,0.3); }
        input { background: #0a0a0a; border: 1px solid #333; color: var(--gold); padding: 15px; border-radius: 15px; text-align: center; font-size: 1.5em; width: 200px; outline: none; margin-bottom: 20px; letter-spacing: 5px; }
        .btn-entry { background: var(--gold); border: none; padding: 12px 40px; border-radius: 12px; font-weight: bold; cursor: pointer; color: #000; font-size: 1.1em; }

        .container { max-width: 450px; margin: auto; padding: 20px; display: none; }
        .card { background: #080808; border-radius: 25px; padding: 20px; margin: 15px 0; border: 1px solid #1a1a1a; border-left: 6px solid var(--gold); text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .bar-container { background: #111; height: 14px; border-radius: 10px; border: 1px solid #222; margin-top: 10px; }
        .bar-fill { background: linear-gradient(90deg, var(--gold), var(--neon)); height: 100%; width: 0%; transition: 1s linear; }

        .vault-amt { font-size: 2.4em; color: #fff; font-weight: bold; text-shadow: 0 0 20px var(--goal); text-align: center; margin: 12px 0; }
        
        /* बाज़ार सिग्नल की शैली */
        .signal-box { padding: 15px; border-radius: 18px; border: 1px solid var(--neon); margin-top: 10px; font-size: 0.9em; font-weight: bold; text-align: center; }
        .step-up-info { font-size: 0.85em; color: #aaa; margin-top: 10px; border-top: 1px dashed #333; padding-top: 10px; }
        .footer { font-size: 0.6em; color: #222; margin-top: 40px; }
    </style>
</head>
<body>

    <div id="lockScreen">
        <img src="logo.png" class="lock-logo">
        <h2 style="color:var(--gold); margin:0;">॥ स्वतंत्र प्रहरी ॥</h2>
        <p style="color:#444; font-size:0.7em; margin-bottom:30px;">सोनू भाई | भीलवाड़ा धर्मशाला</p>
        <input type="password" id="passCode" placeholder="••••" inputmode="numeric">
        <button class="btn-entry" onclick="unlock()">प्रवेश करें</button>
    </div>

    <div class="container" id="mainApp">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <div style="text-align:left;">
                <h3 style="color:var(--gold); margin:0;">॥ सिद्धि मार्ग ॥</h3>
                <small style="color:#555;">लक्ष्य: १० करोड़</small>
            </div>
            <img src="logo.png" style="width:45px; border-radius:50%; border:1px solid var(--gold);">
        </div>

        <div class="card" style="border-left-color: #0088ff;">
            <div style="color:#0088ff; font-weight:bold; font-size:0.9em;">॥ बाज़ार पहरा : विशेष सिग्नल ॥</div>
            <div id="market-signal" class="signal-box">बाज़ार का विश्लेषण जारी...</div>
        </div>

        <div class="card" style="border-left-color: var(--goal);">
            <div style="color:var(--goal); font-weight:bold; font-size:0.9em;">॥ १० करोड़ का संकल्प ॥</div>
            <div id="v-val" class="vault-amt">₹0</div>
            <div id="guide-msg" class="step-up-info"></div>
        </div>

        <div class="card">
            <div style="font-size:0.8em; color:#888; display:flex; justify-content:space-between;">
                <span>२०४७ की ओर यात्रा:</span>
                <span id="percent" style="color:var(--neon)">0.000000%</span>
            </div>
            <div class="bar-container"><div class="bar-fill" id="bar"></div></div>
        </div>

        <div class="card" style="border-left-color: #ff00ff;">
            <div style="color:#ff00ff; font-weight:bold; font-size:0.9em;">हृदय संवाद</div>
            <div id="hridaya" style="font-size:0.85em; font-style:italic; margin-top:8px; color:#ccc;"></div>
        </div>

        <p id="timer" style="color:#333; font-size:0.7em;"></p>
        <div class="footer">ID: laxmidhobi199701 | v5.3 Final</div>
        <button onclick="relock()" style="background:none; border:none; color:#222; font-size:0.8em; margin-top:20px;">Relock</button>
    </div>

<script>
    // १. रिफ्रेश याददाश्त
    window.onload = function() {
        if(localStorage.getItem('prahari_session') === 'active') showApp();
    }

    function unlock() {
        if(document.getElementById('passCode').value === "1994") {
            localStorage.setItem('prahari_session', 'active');
            showApp();
        } else { alert("गलत कोड!"); }
    }

    function showApp() {
        document.getElementById('lockScreen').style.display = "none";
        document.getElementById('mainApp').style.display = "block";
        startGuardian();
    }

    function relock() {
        localStorage.removeItem('prahari_session');
        location.reload();
    }

    // २. मुख्य प्रहरी इंजन
    function startGuardian() {
        const sDate = new Date("February 13, 2026").getTime();
        const eDate = new Date("January 25, 2047").getTime();

        function sync() {
            const now = new Date();
            const nowTime = now.getTime();
            
            // १० करोड़ स्टेप-अप गणित
            const yrsPassed = (nowTime - sDate) / (1000*60*60*24*365.25);
            const yearsFloor = Math.floor(yrsPassed);
            const currentYearSIP = 2500 * Math.pow(1.20, yearsFloor);
            const totalVal = currentYearSIP * ((Math.pow(1 + 0.0125, yrsPassed * 12) - 1) / 0.0125);
            
            document.getElementById('v-val').innerHTML = "₹" + Math.round(totalVal).toLocaleString('hi-IN');

            // २८ अगस्त मार्गदर्शक
            const nextSIP = Math.round(currentYearSIP * 1.20);
            document.getElementById('guide-msg').innerHTML = `अगले २८ अगस्त को ₹${nextSIP - Math.round(currentYearSIP)} जोड़ें। अगली SIP: ₹${nextSIP}`;

            // बाज़ार सिग्नल (सिमुलेशन: २६ फरवरी के निर्देशानुसार)
            const signalBox = document.getElementById('market-signal');
            const day = now.getDay(); 
            if(day === 1 || day === 4) { // काल्पनिक सिग्नल के दिन
                signalBox.innerHTML = "🔥 शुचिता का अवसर: आज बाज़ार में 'Deep' है, अतिरिक्त टॉप-अप करें!";
                signalBox.style.color = "var(--red)";
                signalBox.style.borderColor = "var(--red)";
            } else {
                signalBox.innerHTML = "✅ पहरा जाग्रत: बाज़ार स्थिर है, अपनी तपस्या (SIP) जारी रखें।";
                signalBox.style.color = "var(--neon)";
                signalBox.style.borderColor = "var(--neon)";
            }

            // प्रगति और संवाद
            const p = (((nowTime - sDate) / (eDate - sDate)) * 100).toFixed(6);
            document.getElementById('bar').style.width = p + "%";
            document.getElementById('percent').innerHTML = p + "%";
            
            document.getElementById('hridaya').innerHTML = now.getDate() === 28 ? "सोनू भाई, आज सिद्धि दिवस है।" : "प्रतीक्षा और नीति के भविष्य का पहरा जारी है।";
            document.getElementById('timer').innerHTML = Math.floor((eDate - nowTime) / (1000*60*60*24)) + " दिन शेष";
        }
        setInterval(sync, 1000);
        sync();
    }
</script>
</body>
</html>
