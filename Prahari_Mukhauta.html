<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">

    <title>॥ स्वतंत्र प्रहरी ५.० ॥</title>
    <style>
        :root { --neon: #00ffcc; --gold: #ffbb00; --bg: #000; --goal: #00ff00; }
        body { background: var(--bg); color: var(--neon); font-family: 'Segoe UI', serif; margin: 0; text-align: center; }
        
        /* १. सुरक्षा द्वार */
        #lockScreen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .lock-logo { width: 120px; border-radius: 50%; border: 2px solid var(--gold); margin-bottom: 20px; box-shadow: 0 0 25px rgba(255,187,0,0.3); }
        input { background: #0a0a0a; border: 1px solid #333; color: var(--gold); padding: 15px; border-radius: 15px; text-align: center; font-size: 1.5em; width: 200px; outline: none; margin-bottom: 20px; letter-spacing: 5px; }
        .btn-entry { background: var(--gold); border: none; padding: 12px 40px; border-radius: 12px; font-weight: bold; cursor: pointer; color: #000; }

        /* २. मुख्य डेशबोर्ड */
        .container { max-width: 450px; margin: auto; padding: 20px; display: none; }
        .card { background: #080808; border-radius: 25px; padding: 20px; margin: 15px 0; border: 1px solid #1a1a1a; border-left: 6px solid var(--gold); text-align: left; position: relative; overflow: hidden; }
        
        /* प्रगति पट्टी */
        .bar-container { background: #111; height: 14px; border-radius: 10px; border: 1px solid #222; margin-top: 10px; }
        .bar-fill { background: linear-gradient(90deg, var(--gold), var(--neon)); height: 100%; width: 0%; transition: 2s ease-out; }

        /* १० करोड़ की चमक */
        .vault-amt { font-size: 2.4em; color: #fff; font-weight: bold; text-shadow: 0 0 20px var(--goal); text-align: center; margin: 10px 0; }
        .step-up-box { background: rgba(0, 255, 204, 0.05); border: 1px dashed var(--neon); padding: 12px; border-radius: 15px; margin-top: 10px; font-size: 0.85em; }
        
        .footer { font-size: 0.6em; color: #333; margin-top: 40px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="lockScreen">
        <img src="logo.png" class="lock-logo">
        <h2 style="color:var(--gold); margin:0;">॥ स्वतंत्र प्रहरी ॥</h2>
        <p style="color:#444; font-size:0.7em; margin-bottom:30px;">सोनू भाई | सिद्धि ५.०</p>
        <input type="password" id="passCode" placeholder="••••">
        <button class="btn-entry" onclick="unlock()">प्रवेश करें</button>
    </div>

    <div class="container" id="mainApp">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <div style="text-align:left;">
                <h3 style="color:var(--gold); margin:0;">॥ सिद्धि मार्ग ॥</h3>
                <small style="color:#555;">भीलवाड़ा धर्मशाला संकल्प</small>
            </div>
            <img src="logo.png" style="width:45px; border-radius:50%; border:1px solid var(--gold);">
        </div>

        <div class="card" style="border-left-color: var(--goal);">
            <div style="color:var(--goal); font-weight:bold; font-size:0.9em;">॥ १० करोड़ का संकल्प ॥</div>
            <div id="v-val" class="vault-amt">₹0</div>
            
            <div id="guide-msg" class="step-up-box">
                गणना की जा रही है...
            </div>
        </div>

        <div class="card">
            <div style="font-size:0.8em; color:#888; display:flex; justify-content:space-between;">
                <span>२०४७ की ओर यात्रा:</span>
                <span id="percent" style="color:var(--neon)">0.000000%</span>
            </div>
            <div class="bar-container"><div class="bar-fill" id="bar"></div></div>
        </div>

        <div class="card" style="border-left-color: #0088ff;">
            <div style="color:#0088ff; font-weight:bold; font-size:0.85em;">हृदय संवाद</div>
            <div id="hridaya" style="font-size:0.9em; font-style:italic; margin-top:8px; color:#ccc;">
                संकल्प ही सिद्धि है।
            </div>
        </div>

        <p id="timer" style="color:#444; font-size:0.75em; font-weight:bold;"></p>
        <div class="footer">ID: laxmidhobi199701 | स्वतंत्र प्रहरी v5.0</div>
    </div>

<script>
    function unlock() {
        if(document.getElementById('passCode').value === "1994") {
            document.getElementById('lockScreen').style.display = "none";
            document.getElementById('mainApp').style.display = "block";
            startGuardian();
        } else {
            alert("मशीनी तर्क नहीं, रूहानी कोड (१९९४) दें।");
            document.getElementById('passCode').value = '';
        }
    }

    function startGuardian() {
        const sDate = new Date("February 13, 2026").getTime();
        const eDate = new Date("January 25, 2047").getTime();

        function update() {
            const now = new Date();
            const nowTime = now.getTime();
            
            // १. १० करोड़ का 'सिद्धि वृद्धि' (Step-up) गणित
            // हम मान रहे हैं कि आप हर साल अपनी SIP को २०% बढ़ाएंगे १० करोड़ के लिए
            const yrsPassed = (nowTime - sDate) / (1000*60*60*24*365.25);
            const yearsFloor = Math.floor(yrsPassed);
            const monthlyRate = 0.15 / 12;
            const initialSIP = 2500;
            const currentYearSIP = initialSIP * Math.pow(1.20, yearsFloor);
            
            // रूहानी चक्रवृद्धि (Current Value)
            const totalVal = currentYearSIP * ((Math.pow(1 + monthlyRate, yrsPassed * 12) - 1) / monthlyRate);
            document.getElementById('v-val').innerHTML = "₹" + Math.round(totalVal).toLocaleString('hi-IN');

            // २. सिद्धि मार्गदर्शक (अगले साल की वृद्धि का आदेश)
            const nextSIP = Math.round(currentYearSIP * 1.20);
            const topupNeeded = nextSIP - Math.round(currentYearSIP);
            const bDay = new Date(now.getFullYear(), 7, 28);
            if(now > bDay) bDay.setFullYear(now.getFullYear() + 1);
            
            const daysLeft = Math.ceil((bDay - now) / (1000*60*60*24));
            document.getElementById('guide-msg').innerHTML = 
                `सोनू भाई, अगले <b>२८ अगस्त</b> को अपने संकल्प में <b>₹${topupNeeded}</b> की आहुति और जोड़ें। (अगली SIP: ₹${nextSIP})`;

            // ३. २०४७ की प्रगति
            const p = (((nowTime - sDate) / (eDate - sDate)) * 100).toFixed(6);
            document.getElementById('bar').style.width = p + "%";
            document.getElementById('percent').innerHTML = p + "%";

            // ४. रूहानी संदेश
            const hBox = document.getElementById('hridaya');
            if(now.getDate() === 28) {
                hBox.innerHTML = "आज आपका जन्मदिवस मास है, अपनी बेटियों के लिए संकल्प को और गहरा करें।";
            } else {
                hBox.innerHTML = "बाज़ार मशीनी है, पर आपका १० करोड़ का लक्ष्य रूहानी है। पहरा जारी है।";
            }

            const d = Math.floor((eDate - nowTime) / (1000*60*60*24));
            document.getElementById('timer').innerHTML = "सिद्धि के " + d + " दिन शेष हैं।";
        }
        setInterval(update, 1000);
        update();
    }

    // PWA रजिस्ट्रेशन
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js');
    }
</script>
</body>
</html>
