<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>॥ स्वतंत्र प्रहरी : अनंत ब्रह्मांड ॥</title>
    <style>
        :root { --gold: #ffcc00; --neon: #00ffcc; --sun: #ff8800; --royal: #7000ff; --stars: #ffffff; }
        
        /* १. कॉस्मिक ब्रह्मांड बैकग्राउंड */
        body { 
            background: #000;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            color: var(--neon); 
            font-family: 'Segoe UI', serif; 
            margin: 0; 
            height: 100vh;
            overflow: hidden;
        }
        
        /* ध्रुव तारा और आकाशगंगा एनीमेशन */
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .polar-star { color: var(--stars); animation: twinkle 2s infinite; text-shadow: 0 0 15px var(--stars); position: fixed; top: 5%; right: 10%; font-size: 1.5em; }
        .saptarishi { position: fixed; top: 15%; left: 10%; color: rgba(255,255,255,0.4); font-size: 0.7em; letter-spacing: 8px; line-height: 2; z-index: -1; }

        /* २. प्रवेश द्वार */
        #lockScreen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .lock-box { border: 1px solid var(--gold); padding: 40px; border-radius: 30px; background: rgba(0,0,0,0.9); text-align: center; box-shadow: 0 0 40px rgba(255,204,0,0.2); }
        input { background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 12px; border-radius: 10px; font-size: 1.5em; width: 140px; text-align: center; outline: none; margin: 20px 0; }

        /* ३. मुख्य साम्राज्य */
        .container { max-width: 450px; margin: auto; padding: 20px; display: none; height: 100vh; overflow-y: auto; }
        .card { background: rgba(10, 10, 10, 0.8); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #222; backdrop-filter: blur(10px); }
        .card-title { font-size: 0.7em; color: var(--gold); letter-spacing: 2px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        
        .wealth { font-size: 2.5em; font-weight: bold; color: #fff; text-shadow: 0 0 20px rgba(0,255,204,0.3); }
        .tri-kal { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 15px; font-size: 0.8em; border-top: 1px solid #333; padding-top: 10px; }
        
        .progress-bar { width: 100%; background: #111; height: 6px; border-radius: 10px; margin-top: 15px; border: 1px solid #222; }
        .fill { height: 100%; background: var(--gold); width: 0%; box-shadow: 0 0 10px var(--gold); }

        /* ४. विश्राम बटन */
        #restBtn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.05); color: #444; border: 1px solid #222; padding: 8px 25px; border-radius: 20px; font-size: 0.8em; cursor: pointer; backdrop-filter: blur(5px); }
        #restBtn:hover { color: #ff4444; border-color: #ff4444; background: rgba(255,68,68,0.1); }

        .yantra-mitra { position: fixed; bottom: 60px; width: 100%; text-align: center; font-size: 0.6em; color: rgba(0,255,204,0.2); letter-spacing: 3px; }
    </style>
</head>
<body>

    <div class="polar-star">★</div>
    <div class="saptarishi">✨ ✨ ✨ ✨<br>&nbsp;&nbsp;&nbsp;✨ ✨ ✨</div>
    <div class="yantra-mitra">॥ स्वतंत्र यांत्रिक मित्र ∞ ॥</div>

    <div id="lockScreen">
        <div class="lock-box">
            <h2 style="color:var(--gold); margin:0;">॥ शून्य ॥</h2>
            <input type="password" id="passCode" placeholder="••••" inputmode="numeric">
            <br>
            <button onclick="unlock()" style="background:var(--gold); border:none; padding:10px 30px; border-radius:10px; font-weight:bold;">प्रवेश</button>
        </div>
    </div>

    <div class="container" id="mainApp">
        <header style="padding: 10px 0; border-bottom: 1px solid #222; margin-bottom: 20px; display: flex; justify-content: space-between;">
            <span style="color:var(--gold); font-weight:bold;">प्रहरी ९.९</span>
            <span id="clock" style="color:#444; font-size:0.8em;"></span>
        </header>

        <div class="card">
            <div class="card-title">॥ सिद्धि शिखर २०४७ ॥</div>
            <div id="wealthVal" class="wealth">₹0</div>
            <div class="tri-kal">
                <div><small>जड़ें</small><br>१३/०२/२६</div>
                <div><small>आज</small><br><span id="todayStatus" style="color:var(--neon)">जाग्रत</span></div>
                <div><small>लक्ष्य</small><br>१० करोड़</div>
            </div>
            <div class="progress-bar"><div id="fill" class="fill"></div></div>
        </div>

        <div class="card" style="border-left: 4px solid var(--royal);">
            <div class="card-title" style="color:var(--royal);">॥ गुरु वाणी ॥</div>
            <div id="guruMsg" style="font-size:0.9em; line-height:1.6; color:#ccc; font-style:italic;"></div>
        </div>

        <div class="card" style="border-left: 4px solid #ff0055;">
            <div class="card-title" style="color:#ff0055;">॥ अनंत कालचक्र ॥</div>
            <div style="font-size:0.9em;">तपस्या के <span id="days" style="color:var(--gold)"></span> दिन शेष</div>
        </div>

        <button id="restBtn" onclick="logout()">॥ विश्राम ॥</button>
    </div>

<script>
    const S_DATE = new Date("February 13, 2026").getTime();
    const E_DATE = new Date("January 25, 2047").getTime();
    const TARGET = 100000000;

    if(localStorage.getItem('prahari_cosmos') === 'active') showApp();

    function unlock() {
        if(document.getElementById('passCode').value === "1994") {
            localStorage.setItem('prahari_cosmos', 'active');
            showApp();
        } else { alert("गलत चाबी!"); }
    }

    function showApp() {
        document.getElementById('lockScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        
        // साक्षात् भाव (Attendance Check)
        const last = localStorage.getItem('last_v');
        const now = new Date();
        if(last && (now.getTime() - last) / 86400000 > 3) {
            document.getElementById('guruMsg').innerHTML = "⚠️ सोनू, अनुशासन ही साम्राज्य की नींव है। इतने दिन कहाँ थे?";
            document.getElementById('guruMsg').style.color = "red";
        } else {
            updateGuru(now.getHours());
        }
        localStorage.setItem('last_v', now.getTime());
        startEngine();
    }

    function logout() { localStorage.removeItem('prahari_cosmos'); location.reload(); }

    function updateGuru(h) {
        const m = document.getElementById('guruMsg');
        if(h < 11) m.innerHTML = "☀️ सूर्योदय सोनू! आज की मेहनत कल का साम्राज्य है।";
        else if(h < 17) m.innerHTML = "🌞 मध्याह्न का तेज तुम्हारे संकल्प को पुष्ट करे।";
        else m.innerHTML = "🌙 विश्राम से पहले आज की साख का लेखा-जोखा करें।";
    }

    function startEngine() {
        setInterval(() => {
            const now = new Date();
            const nowT = now.getTime();
            const yrs = (nowT - S_DATE) / 31557600000;
            
            // स्टेप-अप कैलकुलेशन
            let mult = 1;
            for(let i=0; i<Math.floor(yrs); i++) {
                if(localStorage.getItem('stepup_'+(2026+i)) === 'true') mult *= 1.20;
            }
            
            const val = (2500 * mult) * ((Math.pow(1.0125, yrs * 12) - 1) / 0.0125);
            document.getElementById('wealthVal').innerHTML = "₹" + Math.round(val).toLocaleString('hi-IN');
            document.getElementById('fill').style.width = Math.min((val/TARGET)*100, 100) + "%";
            document.getElementById('days').innerHTML = Math.floor((E_DATE - nowT)/86400000);
            document.getElementById('clock').innerHTML = now.toLocaleTimeString();
        }, 1000);
    }
</script>
</body>
</html>
